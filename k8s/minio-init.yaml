# Job to create default buckets in MinIO
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: data-platform
  labels:
    app: minio-init
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:latest
        command:
        - sh
        - -c
        - |
          sleep 10
          mc alias set local http://minio:9000 minioadmin minioadmin
          mc mb local/raw-data         --ignore-existing
          mc mb local/processed-data   --ignore-existing
          mc mb local/model-artifacts  --ignore-existing
          mc mb local/notebooks-output --ignore-existing
          echo "All buckets created successfully!"
          mc ls local/
